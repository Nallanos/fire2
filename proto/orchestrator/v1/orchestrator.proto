syntax = "proto3";

package orchestrator.v1;

option go_package = "github/nallanos/fire2/gen/orchestrator/v1;orchestrator";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service OrchestratorService {
  rpc IngestSandboxEvent(SandboxEvent) returns (google.protobuf.Empty);
  rpc ReportWorkerHeartbeat(WorkerHeartbeat) returns (google.protobuf.Empty);
}

message WorkerHeartbeat {
  string worker_id  = 1;
  string status     = 2;
  string address    = 3;
  int32  port       = 4;
  int32  capacity   = 5;
  int32  cpu_budget = 6;
  int32  mem_budget = 7;
  int32  cpu_usage  = 8;
  int32  mem_usage  = 9;
}

message SandboxEvent {
  string id = 1;
  string sandbox_id = 2;
  string container_id = 3;
  string worker_id = 4;
  string event_type = 5;
  string action = 6;
  string actor_id = 7;
  map<string, string> attributes = 8;
  google.protobuf.Timestamp occurred_at = 9;
}
