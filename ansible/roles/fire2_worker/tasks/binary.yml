---
- name: Create install directory
  ansible.builtin.file:
    path: "{{ fire2_install_dir }}"
    state: directory
    owner: "{{ fire2_user }}"
    group: "{{ fire2_group }}"
    mode: "0755"

- name: Deploy worker binary
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../dist/worker"
    dest: "{{ fire2_install_dir }}/worker"
    owner: "{{ fire2_user }}"
    group: "{{ fire2_group }}"
    mode: "0755"
  notify: restart fire2-worker

- name: Deploy create_worker binary
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../dist/create_worker"
    dest: "{{ fire2_install_dir }}/create_worker"
    owner: "{{ fire2_user }}"
    group: "{{ fire2_group }}"
    mode: "0755"
