---
fire2_user: fire2
fire2_group: fire2
fire2_install_dir: /opt/fire2

worker_port: 50051
worker_heartbeat_interval: 5s
worker_cpu_budget: 4
worker_mem_budget: 8192

# Stable identifier used for create_worker --id.
# Derived from inventory hostname so re-runs always hit the same DB row.
worker_id: "{{ inventory_hostname }}"

# Address the orchestrator dials to reach this worker over gRPC.
# Defaults to the primary interface IP auto-detected by Ansible.
worker_advertised_host: "{{ ansible_default_ipv4.address }}"
