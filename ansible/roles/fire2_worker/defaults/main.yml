---
fire2_user: fire2
fire2_group: fire2
fire2_install_dir: /opt/fire2

# How many worker processes to run on this VM.
# Each instance gets its own systemd unit (fire2-worker@N) and env file
# (worker-N.env) so they can all use port 0 (ephemeral) without colliding.
worker_instances: 1

# 0 = OS-assigned ephemeral port (self-reported via heartbeat). This lets many
# workers share one VM without manual per-worker port assignment. Pin a value
# only if you need a fixed port.
worker_port: 0
worker_heartbeat_interval: 5s
worker_cpu_budget: 4
worker_mem_budget: 3000

# Stable identifier prefix passed as WORKER_ID. The instance number is
# appended automatically (e.g. "myhost-1", "myhost-2") so each process
# registers as a distinct worker row in the DB.
worker_id: "{{ ansible_hostname }}"

# Address the orchestrator dials to reach this worker over gRPC.
# Defaults to the primary interface IP auto-detected by Ansible.
worker_advertised_host: "{{ ansible_default_ipv4.address }}"
