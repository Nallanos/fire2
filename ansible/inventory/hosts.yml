---
# Replace ansible_host values with your real VM addresses.
# worker_cpu_budget / worker_mem_budget may be overridden per host.
all:
  children:
    workers:
      hosts:
        worker-1:
          ansible_host: 192.0.2.10
          ansible_user: ubuntu
          worker_cpu_budget: 4
          worker_mem_budget: 8192
        worker-2:
          ansible_host: 192.0.2.11
          ansible_user: ubuntu
          worker_cpu_budget: 4
          worker_mem_budget: 8192
